name: keep-alive

# Render's free tier spins the backend down after ~15 min of inactivity, and
# on top of the container cold-start the model has a ~2.2s warmup (see
# docs/RESULTS.md). This workflow pings /health on a schedule so the first
# real user request after idle isn't the one that pays both cold starts.
#
# SETUP: add a repository VARIABLE named BACKEND_URL (Settings > Secrets and
# variables > Actions > Variables) set to the live Render URL, e.g.
#   https://cartiq-backend.onrender.com
# Until that variable is set, the job no-ops instead of failing.
#
# CAVEAT: GitHub's scheduled runners are best-effort and can be delayed 5-15+
# min under load, and schedules are auto-disabled after 60 days of repo
# inactivity. For a portfolio demo this is usually fine; if you need
# rock-solid warmth, an external pinger (UptimeRobot / cron-job.org) hitting
# the same /health URL is more reliable. This is committed so the keep-alive
# is reproducible from the repo, not a hidden manual setup.

on:
  schedule:
    - cron: "*/12 * * * *"  # every 12 minutes — under Render's ~15 min idle window
  workflow_dispatch: {}      # allow manual "warm it now" runs

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend /health
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          if [ -z "${BACKEND_URL}" ]; then
            echo "BACKEND_URL repo variable not set yet — skipping (no-op)."
            exit 0
          fi
          echo "Pinging ${BACKEND_URL}/health"
          code=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 30 "${BACKEND_URL}/health" || true)
          echo "HTTP ${code}"
          # A 200 means warm. Don't fail the workflow on a transient miss —
          # this is best-effort warming, not a uptime SLA gate.
          [ "${code}" = "200" ] && echo "Backend warm." || echo "Non-200 (cold start or transient) — will retry next tick."
