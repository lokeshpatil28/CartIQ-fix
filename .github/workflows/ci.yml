name: CI

# Run the test suite on every push and every PR. The suite covers data
# generation, label generation, feature engineering, and the train/serve
# parity guard — including the regression test that proves labels aren't a
# deterministic function of visible features (the anti-circularity guard).
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q
